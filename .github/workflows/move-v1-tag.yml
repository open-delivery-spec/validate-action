name: Move v1 tag

# Keeps the floating `v1` tag on the latest release so `uses: ...@v1` users
# actually receive released improvements. The tag had been stranded on
# v0.2.1 while main advanced — everyone following the README's `@v1`
# recommendation (including this org's own dogfooding) silently ran the old
# action with a pre-fix CLI.
#
# - release published  → v1 moves to that release's tag
# - workflow_dispatch  → v1 moves to the default branch tip (bootstrap/repair)

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  move:
    runs-on: ubuntu-latest
    # Prereleases must not move the floating tag.
    if: github.event_name == 'workflow_dispatch' || !github.event.release.prerelease
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Force-move v1
        env:
          EVENT: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          if [ "$EVENT" = "release" ]; then
            TARGET="refs/tags/${RELEASE_TAG}"
          else
            TARGET="origin/${DEFAULT_BRANCH}"
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f v1 "$TARGET"
          git push -f origin v1
          echo "v1 → $(git rev-parse --short v1) ($TARGET)"
