# ODS Validate — Dogfooding workflow for the validate-action repository
#
# Runs AI code quality gate on every PR to main.

name: ODS Validate

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Conventional branch & commit checks
        uses: commit-check/commit-check-action@v2
        with:
          message: true
          branch: true

      - name: ODS AI code quality gate
        uses: open-delivery-spec/validate-action@v1
        with:
          diff-base: ${{ github.event.pull_request.base.sha || 'origin/main' }}
          branch: ${{ github.head_ref }}
          summary: 'true'
          comment: 'true'
