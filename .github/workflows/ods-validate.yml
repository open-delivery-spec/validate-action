# ODS Validate — Dogfooding workflow for the validate-action repository
#
# Runs AI code quality gate on every PR to main.

name: ODS Validate

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Conventional branch & commit checks
        run: |
          python3 -m pip install 'commit-check>=2.9.0'
          commit-check --message --branch

      - name: ODS AI code quality gate
        uses: open-delivery-spec/validate-action@9ad36c25b34884d11b1277d4728efbfef7f06c46 # v1
        with:
          diff-base: ${{ github.event.pull_request.base.sha || 'origin/main' }}
          branch: ${{ github.head_ref }}
          summary: 'true'
          comment: 'true'
