# ODS Validate — Dogfooding workflow for the validate-action repository
#
# Runs AI code quality gate on every PR to main.

name: ODS Validate

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: ODS AI code quality gate
        uses: ./ # self test
        with:
          diff-base: ${{ github.event.pull_request.base.sha || 'origin/main' }}
          branch: ${{ github.head_ref }}
          summary: 'true'
          comment: 'true'
