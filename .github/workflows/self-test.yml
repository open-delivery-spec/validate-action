name: Self Test

on:
  push:
  pull_request:

jobs:
  m1-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Branch naming
        uses: ./
        with:
          check: branch-naming
          branch_name: feature/add-oauth-login

      - name: Invalid branch is rejected
        id: bad-branch
        continue-on-error: true
        uses: ./
        with:
          check: branch-naming
          branch_name: BadBranch

      - name: Verify invalid branch failed
        if: steps.bad-branch.outcome != 'failure'
        run: |
          echo "Expected branch-naming to fail for BadBranch"
          exit 1

      - name: Commit message
        uses: ./
        with:
          check: commit-message
          commit_message: |
            feat(auth): add OAuth login

            AI-assisted: true
            AI-tool: GitHub Copilot
            AI-scope: auth module

      - name: PR description
        uses: ./
        with:
          check: pr-description
          pr_body: |
            ## Summary
            Add OAuth login.

            ## Type
            - [x] Feature

            ## AI Disclosure
            - [x] This PR contains AI-generated code
            - AI Tool: GitHub Copilot

            ## Changes
            - Added provider integration.

            ## Testing
            - Unit tests added.

            ## Checklist
            - [x] Branch follows ODS.

      - name: All available M1 checks
        uses: ./
        with:
          check: all
          branch_name: feature/add-oauth-login
          commit_message: |
            feat(auth): add OAuth login

            AI-assisted: true
            AI-tool: GitHub Copilot
          pr_body: |
            ## Summary
            Add OAuth login.

            ## Type
            - [x] Feature

            ## AI Disclosure
            - [x] This PR contains AI-generated code
            - AI Tool: GitHub Copilot

            ## Changes
            - Added provider integration.

            ## Testing
            - Unit tests added.

            ## Checklist
            - [x] Branch follows ODS.
