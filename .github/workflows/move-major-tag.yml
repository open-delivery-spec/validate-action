name: Move Major Tag

on:
  release:
    types: [published, edited]

permissions:
  contents: write

jobs:
  move-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Move v1 tag to latest release
        run: |
          TAG_VERSION="${{ github.event.release.tag_name }}"
          echo "Release tag: $TAG_VERSION"

          # v1 is the only major tag. Any v0.x.x or v1.x.x release updates it.
          # Users reference validate-action@v1 to always get the latest.
          if ! echo "$TAG_VERSION" | grep -qE '^v[01]\.'; then
            echo "Skipping: only v0.x.x and v1.x.x releases update the v1 tag"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          echo "Moving v1 tag to $TAG_VERSION (${{ github.sha }})"
          git tag -d v1 2>/dev/null || true
          git push origin --delete v1 2>/dev/null || true
          git tag v1 "${{ github.sha }}"
          git push origin v1
          echo "✅ v1 tag updated to point to $TAG_VERSION"
