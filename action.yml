name: Open Delivery Spec
description: Validate delivery artifacts against Open Delivery Spec standards
author: Open Delivery Spec Contributors
branding:
  icon: check-circle
  color: green

inputs:
  check:
    description: 'Type of check to run'
    required: true
    default: 'all'
    # M1 production checks: branch-naming | commit-message | pr-description | all

  branch_name:
    description: 'Branch name to validate (for branch-naming check)'
    required: false

  commit_message:
    description: 'Commit message to validate (for commit-message check)'
    required: false

  pr_body:
    description: 'PR description body (for pr-description check)'
    required: false

  pr_number:
    description: 'Reserved for future AI review and approval checks'
    required: false

  review_record:
    description: 'Reserved for future AI review checks'
    required: false

  release_version:
    description: 'Reserved for future release readiness checks'
    required: false

  rollback_plan:
    description: 'Reserved for future rollback plan checks'
    required: false

  evidence_bundle:
    description: 'Reserved for future evidence bundle checks'
    required: false

  strict:
    description: 'Fail on warnings as well as errors'
    required: false
    default: 'false'

  spec_version:
    description: 'ODS spec version to validate against'
    required: false
    default: '1.0.0'

  profile:
    description: 'ODS compliance profile'
    required: false
    default: 'l1'

  report:
    description: 'Report format to generate'
    required: false
    default: 'html'

  summary:
    description: 'Write ODS report Markdown to the GitHub Actions job summary'
    required: false
    default: 'true'

  comment:
    description: 'Create or update an ODS report comment on pull requests'
    required: false
    default: 'true'

  artifact:
    description: 'Upload the generated ODS report directory as a workflow artifact'
    required: false
    default: 'true'

  output-dir:
    description: 'Directory where ODS report files are written'
    required: false
    default: 'ods-report'

  artifact-name:
    description: 'Workflow artifact name for the generated ODS report'
    required: false
    default: 'ods-compliance-report'

  artifact-retention-days:
    description: 'Number of days to retain the uploaded ODS report artifact'
    required: false
    default: '30'

  github-token:
    description: 'GitHub token used for PR comments'
    required: false
    default: ${{ github.token }}

  cli-ref:
    description: 'ODS CLI version, tag, or commit to install'
    required: false
    default: 'main'

outputs:
  result:
    description: 'conformant | conformant-with-warnings | non-conformant'
    value: ${{ steps.report.outputs.result }}

runs:
  using: composite
  steps:
    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.23'

    - name: Install ODS CLI
      shell: bash
      env:
        CLI_REF: ${{ inputs.cli-ref }}
      run: go install "github.com/open-delivery-spec/cli/cmd/ods@${CLI_REF}"

    - name: Generate ODS Report
      id: report
      shell: bash
      env:
        CHECK: ${{ inputs.check }}
        BRANCH_NAME: ${{ inputs.branch_name }}
        COMMIT_MESSAGE: ${{ inputs.commit_message }}
        PR_BODY: ${{ inputs.pr_body }}
        PR_NUMBER: ${{ inputs.pr_number }}
        STRICT: ${{ inputs.strict }}
        OUTPUT_DIR: ${{ inputs.output-dir }}
      run: |
        set -u

        STRICT_FLAG=""
        if [ "$STRICT" = "true" ]; then
          STRICT_FLAG="--strict"
        fi

        case "$CHECK" in
          branch-naming|commit-message|pr-description|all)
            ;;
          ai-review|ci-failure|release-readiness|approval-workflow|rollback-plan|prod-evidence)
            echo "Check '$CHECK' is experimental and is not enforced by validate-action yet."
            echo "Use the ODS CLI validate subcommands directly for draft module schema checks."
            echo "result=non-conformant" >> "$GITHUB_OUTPUT"
            exit 1
            ;;
          *)
            echo "Unknown check: $CHECK"
            echo "result=non-conformant" >> "$GITHUB_OUTPUT"
            exit 1
            ;;
        esac

        export ODS_REPORT_CHECK="$CHECK"
        export ODS_BRANCH_NAME="$BRANCH_NAME"
        export ODS_COMMIT_MESSAGE="$COMMIT_MESSAGE"
        export ODS_PR_BODY="$PR_BODY"
        export ODS_PR_NUMBER="$PR_NUMBER"

        set +e
        ods report --output "$OUTPUT_DIR" $STRICT_FLAG
        REPORT_STATUS=$?
        set -e

        if [ -f "$OUTPUT_DIR/ods-compliance.json" ]; then
          RESULT=$(python3 - "$OUTPUT_DIR/ods-compliance.json" <<'PY'
        import json
        import sys

        with open(sys.argv[1], encoding="utf-8") as handle:
            status = json.load(handle).get("status", "non_compliant")

        print({
            "compliant": "conformant",
            "compliant_with_warnings": "conformant-with-warnings",
            "non_compliant": "non-conformant",
        }.get(status, "non-conformant"))
        PY
        )
        else
          RESULT="non-conformant"
        fi

        echo "result=$RESULT" >> "$GITHUB_OUTPUT"
        echo "report_status=$REPORT_STATUS" >> "$GITHUB_OUTPUT"

    - name: Add ODS Job Summary
      if: inputs.summary == 'true'
      shell: bash
      env:
        OUTPUT_DIR: ${{ inputs.output-dir }}
      run: |
        if [ -n "${GITHUB_STEP_SUMMARY:-}" ] && [ -f "$OUTPUT_DIR/ods-summary.md" ]; then
          cat "$OUTPUT_DIR/ods-summary.md" >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Upload ODS Report
      if: inputs.artifact == 'true'
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.output-dir }}/
        retention-days: ${{ inputs.artifact-retention-days }}

    - name: Comment on Pull Request
      if: inputs.comment == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        OUTPUT_DIR: ${{ inputs.output-dir }}
      run: |
        set -u

        if [ -z "${GH_TOKEN:-}" ]; then
          echo "::warning::Skipping ODS PR comment because github-token is empty."
          exit 0
        fi

        if [ ! -f "$OUTPUT_DIR/ods-summary.md" ]; then
          echo "::warning::Skipping ODS PR comment because $OUTPUT_DIR/ods-summary.md was not found."
          exit 0
        fi

        PR_NUMBER=$(python3 - <<'PY'
        import json
        import os

        with open(os.environ["GITHUB_EVENT_PATH"], encoding="utf-8") as handle:
            event = json.load(handle)

        pull_request = event.get("pull_request") or {}
        print(pull_request.get("number") or event.get("number") or "")
        PY
        )

        if [ -z "$PR_NUMBER" ]; then
          echo "::warning::Skipping ODS PR comment because pull request number was not detected."
          exit 0
        fi

        RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
        COMMENT_BODY=$(mktemp)
        COMMENT_JSON=$(mktemp)
        COMMENTS_JSON=$(mktemp)

        {
          echo "<!-- ods-compliance-report -->"
          cat "$OUTPUT_DIR/ods-summary.md"
          echo
          echo "[View workflow run]($RUN_URL)"
          echo "[Download compliance artifact]($RUN_URL)"
        } > "$COMMENT_BODY"

        python3 - "$COMMENT_BODY" "$COMMENT_JSON" <<'PY'
        import json
        import sys

        with open(sys.argv[1], encoding="utf-8") as handle:
            body = handle.read()

        with open(sys.argv[2], "w", encoding="utf-8") as handle:
            json.dump({"body": body}, handle)
        PY

        COMMENTS_URL="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments"
        if ! curl -fsSL \
          -H "Authorization: Bearer ${GH_TOKEN}" \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          "${COMMENTS_URL}?per_page=100" \
          -o "$COMMENTS_JSON"; then
          echo "::warning::Unable to list PR comments for ODS report."
          exit 0
        fi

        COMMENT_ID=$(python3 - "$COMMENTS_JSON" <<'PY'
        import json
        import sys

        marker = "<!-- ods-compliance-report -->"
        with open(sys.argv[1], encoding="utf-8") as handle:
            comments = json.load(handle)

        for comment in comments:
            if marker in (comment.get("body") or ""):
                print(comment.get("id", ""))
                break
        PY
        )

        if [ -n "$COMMENT_ID" ]; then
          METHOD="PATCH"
          URL="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/issues/comments/${COMMENT_ID}"
        else
          METHOD="POST"
          URL="$COMMENTS_URL"
        fi

        if ! curl -fsSL \
          -X "$METHOD" \
          -H "Authorization: Bearer ${GH_TOKEN}" \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          "$URL" \
          --data-binary "@${COMMENT_JSON}" \
          >/dev/null; then
          echo "::warning::Unable to create or update ODS PR comment."
        fi

    - name: Check ODS Compliance Result
      shell: bash
      env:
        REPORT_STATUS: ${{ steps.report.outputs.report_status }}
      run: |
        if [ "$REPORT_STATUS" != "0" ]; then
          exit "$REPORT_STATUS"
        fi
