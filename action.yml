name: Open Delivery Spec
description: AI code quality gate — detect AI code, analyze quality, score tech debt, enforce policy
author: Open Delivery Spec Contributors
branding:
  icon: check-circle
  color: green

inputs:
  diff-base:
    description: 'Git ref to diff against (e.g., origin/main, HEAD~3)'
    required: false
    default: 'origin/main'

  pr-body:
    description: 'PR description body text (auto-detected from event if omitted)'
    required: false

  pr-body-file:
    description: 'Path to file containing PR description body'
    required: false

  branch:
    description: 'Branch name (auto-detected from git if omitted)'
    required: false

  commits:
    description: 'Maximum number of commits to scan for AI markers'
    required: false
    default: '10'

  policy:
    description: 'Path to OPA Rego policy file'
    required: false
    default: '.ods/policy.rego'

  sarif:
    description: >-
      Path to a SARIF v2.1.0 file from an external analyzer (Semgrep, CodeQL,
      golangci-lint, ESLint, ...) to merge into the analysis, score, and policy
      gate. These findings are authoritative and multi-language; ODS built-in
      heuristics are only hints.
    required: false
    default: ''

  semgrep:
    description: >-
      Run Semgrep automatically and merge its findings (zero-setup multi-language
      analysis). Ignored when `sarif` is set — bring-your-own SARIF wins.
    required: false
    default: 'false'

  semgrep-config:
    description: >-
      Semgrep ruleset used when `semgrep: true`. Defaults to the curated `auto`
      registry config; can be a registry ID (e.g. p/ci) or a local rules file.
    required: false
    default: 'auto'

  report:
    description: >-
      Append an AI attribution digest (AI vs human commit/line share over a
      window) to the job summary, PR comment, and artifact. Needs full git
      history (checkout with fetch-depth: 0).
    required: false
    default: 'false'

  report-since:
    description: 'History window for the attribution digest (any git --since expression).'
    required: false
    default: '90 days ago'

  summary:
    description: 'Append Markdown report to the GitHub Actions job summary'
    required: false
    default: 'true'

  comment:
    description: 'Create or update an ODS report comment on pull requests'
    required: false
    default: 'true'

  review-routing:
    description: >-
      Act on the policy's review_tier verdict: label the PR
      (ods:review/auto|standard|elevated) and, for elevated, request the
      reviewers listed in elevated-reviewers. Requires a policy that defines
      review_tier and a CLI version that reports it. Routing is advisory and
      never fails the run.
    required: false
    default: 'false'

  elevated-reviewers:
    description: >-
      Comma-separated GitHub usernames to request as reviewers when the
      review tier is "elevated" (used only with review-routing: true).
    required: false
    default: ''

  artifact:
    description: 'Upload the generated ODS report directory as a workflow artifact'
    required: false
    default: 'true'

  output-dir:
    description: 'Directory where ODS report files are written'
    required: false
    default: 'ods-report'

  artifact-name:
    description: 'Workflow artifact name for the generated ODS report'
    required: false
    default: 'ods-report'

  artifact-retention-days:
    description: 'Number of days to retain the uploaded ODS report artifact'
    required: false
    default: '30'

  github-token:
    description: 'GitHub token used for PR comments'
    required: false
    default: ${{ github.token }}

  cli-ref:
    description: >-
      ODS CLI version, tag, or commit to install. Defaults to a pinned stable
      release for reproducible runs; set to `main` to track the latest.
    required: false
    default: 'v0.5.0'

outputs:
  result:
    description: 'pass | warn | block'
    value: ${{ steps.ods.outputs.result }}
  ai-detected:
    description: 'Whether AI code was detected'
    value: ${{ steps.ods.outputs.ai_detected }}
  ai-confidence:
    description: 'AI detection confidence (0.0–1.0)'
    value: ${{ steps.ods.outputs.ai_confidence }}
  tech-debt-delta:
    description: 'Technical debt delta score'
    value: ${{ steps.ods.outputs.tech_debt_delta }}
  policy-allowed:
    description: 'Whether the OPA policy allowed the change'
    value: ${{ steps.ods.outputs.policy_allowed }}
  review-tier:
    description: 'Policy review-routing verdict: auto | standard | elevated'
    value: ${{ steps.ods.outputs.review_tier }}

runs:
  using: composite
  steps:
    - name: Setup Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
      with:
        go-version: '1.25'
        cache: false

    - name: Install ODS CLI
      shell: bash
      env:
        CLI_REF: ${{ inputs.cli-ref }}
      run: go install "github.com/open-delivery-spec/cli/cmd/ods@${CLI_REF}"

    - name: Run Semgrep (optional)
      id: semgrep
      if: inputs.semgrep == 'true'
      shell: bash
      env:
        SEMGREP_CONFIG: ${{ inputs.semgrep-config }}
        USER_SARIF: ${{ inputs.sarif }}
      run: |
        set -euo pipefail
        if [ -n "${USER_SARIF:-}" ]; then
          echo "::notice::Both 'sarif' and 'semgrep: true' are set — using the provided sarif and skipping Semgrep."
          exit 0
        fi
        echo "::group::Install & run Semgrep"
        python3 -m pip install --quiet --disable-pip-version-check semgrep
        # Ensure the console script is reachable even on a --user pip layout.
        export PATH="$PATH:$(python3 -m site --user-base)/bin"
        OUT="${RUNNER_TEMP:-/tmp}/ods-semgrep.sarif"
        # Findings make Semgrep exit non-zero; ODS — not this step — gates on them.
        semgrep --config "${SEMGREP_CONFIG:-auto}" --sarif --output "$OUT" || true
        if [ -f "$OUT" ]; then
          # Hand the path to the pipeline step via a step output, NOT
          # GITHUB_ENV: env vars are job-scoped, so a GITHUB_ENV export leaks
          # into every later invocation of this action in the same job and
          # silently merges this SARIF into gates that never asked for it.
          echo "sarif_path=$OUT" >> "$GITHUB_OUTPUT"
          echo "Semgrep SARIF written to $OUT"
        else
          echo "::warning::Semgrep produced no SARIF file — continuing without it."
        fi
        echo "::endgroup::"

    - name: Fetch git-ai authorship notes (best effort)
      shell: bash
      run: |
        # git-ai (git-ai-project/git-ai) records line-level AI authorship
        # under refs/notes/ai; the CLI reads it as the highest-fidelity
        # attribution source. CI checkouts don't fetch notes by default, so
        # pull them here. Best effort: absence is the normal case on repos
        # not using git-ai, and a failed fetch must never fail the gate.
        git fetch origin '+refs/notes/ai:refs/notes/ai' 2>/dev/null || true

    - name: Run ODS Pipeline
      id: ods
      shell: bash
      env:
        # Scoped to this invocation via step output (empty when the Semgrep
        # step was skipped) — see the leak note in the Semgrep step.
        ODS_GENERATED_SARIF: ${{ steps.semgrep.outputs.sarif_path }}
        ODS_DIFF_BASE: ${{ inputs.diff-base }}
        ODS_PR_BODY: ${{ inputs.pr-body }}
        ODS_PR_BODY_FILE: ${{ inputs.pr-body-file }}
        ODS_BRANCH: ${{ inputs.branch }}
        ODS_COMMITS: ${{ inputs.commits }}
        ODS_POLICY: ${{ inputs.policy }}
        ODS_SARIF: ${{ inputs.sarif }}
        ODS_OUTPUT_DIR: ${{ inputs.output-dir }}
        INPUT_SUMMARY: ${{ inputs.summary }}
        GITHUB_HEAD_REF: ${{ github.head_ref }}
        GITHUB_BASE_REF: ${{ github.base_ref }}
        GITHUB_WORKSPACE: ${{ github.workspace }}
        ACTION_DIR: ${{ github.action_path }}
      run: |
        set -euo pipefail
        mkdir -p "$ODS_OUTPUT_DIR"

        # Build detect args as an ARRAY expanded with quotes. Never splice the
        # PR body into a flat string: unquoted expansion word-splits it, so any
        # flag-looking token an author writes in a PR description (e.g. a
        # `git push -f` snippet) becomes a CLI flag — breaking detection and
        # handing PR authors an argument-injection vector. printf %q does NOT
        # protect a string that is expanded without eval.
        DETECT_ARGS=(--diff-base "$ODS_DIFF_BASE" --commits "$ODS_COMMITS")
        # Export diff-base for CLI commands that do not yet accept --diff-base
        export ODS_DIFF_BASE="$ODS_DIFF_BASE"

        PR_BODY_SOURCE=""
        if [ -n "${ODS_PR_BODY:-}" ]; then
          DETECT_ARGS+=(--pr-body "$ODS_PR_BODY")
          PR_BODY_SOURCE="flag"
        elif [ -n "${ODS_PR_BODY_FILE:-}" ] && [ -f "$ODS_PR_BODY_FILE" ]; then
          DETECT_ARGS+=(--pr-file "$ODS_PR_BODY_FILE")
          ODS_PR_BODY="$(cat "$ODS_PR_BODY_FILE")"
          PR_BODY_SOURCE="file"
        elif [ -n "${GITHUB_EVENT_PATH:-}" ] && [ -f "$GITHUB_EVENT_PATH" ]; then
          # Extract PR body from GitHub event using jq
          PR_BODY=$(jq -r '.pull_request.body // ""' "$GITHUB_EVENT_PATH" 2>/dev/null || echo "")
          if [ -n "$PR_BODY" ]; then
            DETECT_ARGS+=(--pr-body "$PR_BODY")
            ODS_PR_BODY="$PR_BODY"
            PR_BODY_SOURCE="event"
          fi
        fi

        BRANCH="${ODS_BRANCH:-}"
        if [ -z "$BRANCH" ]; then
          BRANCH="${GITHUB_HEAD_REF:-}"
        fi
        if [ -z "$BRANCH" ]; then
          BRANCH=$(git branch --show-current 2>/dev/null || echo "")
        fi
        if [ -n "$BRANCH" ]; then
          DETECT_ARGS+=(--branch "$BRANCH")
          # Export both env var names for CLI compatibility
          export ODS_BRANCH="$BRANCH"
          export ODS_BRANCH_NAME="$BRANCH"
        fi

        echo "::group::① Detect — AI Code Detection"
        DETECT_JSON="$ODS_OUTPUT_DIR/detect.json"
        set +e
        ods detect --json "${DETECT_ARGS[@]}" > "$DETECT_JSON" 2>"$ODS_OUTPUT_DIR/detect.stderr"
        DETECT_EXIT=$?
        set -e
        # ods detect exits non-zero for BOTH errors AND high-confidence positive results.
        # Validate by checking for the expected 'ai_generated' key in the JSON output —
        # if absent the file is empty/corrupt and detection is inconclusive.
        if ! python3 -c "import json,sys; d=json.load(open(sys.argv[1])); sys.exit(0 if 'ai_generated' in d else 1)" "$DETECT_JSON" 2>/dev/null; then
          echo "::warning::ods detect produced no valid output (exit=$DETECT_EXIT) — detection marked inconclusive"
          if [ -s "$ODS_OUTPUT_DIR/detect.stderr" ]; then
            echo "--- ods detect error output ---"
            cat "$ODS_OUTPUT_DIR/detect.stderr"
          fi
          printf '{"_ods_detect_error":true,"ai_generated":false,"confidence":0,"evidence":[],"sources":[],"summary":"Detection inconclusive"}\n' > "$DETECT_JSON"
        fi
        echo "::endgroup::"

        echo "::group::② Analyze — AI Code Quality"
        ANALYZE_JSON="$ODS_OUTPUT_DIR/analyze.json"
        # Prefer a user-provided SARIF; otherwise use one generated by the
        # optional Semgrep step (exported as ODS_GENERATED_SARIF).
        SARIF_FILE="${ODS_SARIF:-}"
        if [ -z "$SARIF_FILE" ] && [ -n "${ODS_GENERATED_SARIF:-}" ]; then
          SARIF_FILE="$ODS_GENERATED_SARIF"
        fi
        # SARIF_FLAGS is shared across analyze/score/check so external findings
        # reach the score and the policy gate, not just the analyze report.
        SARIF_FLAGS=()
        if [ -n "$SARIF_FILE" ]; then
          if [ -f "$SARIF_FILE" ]; then
            SARIF_FLAGS+=(--sarif "$SARIF_FILE")
            echo "Merging external SARIF findings from: $SARIF_FILE"
          else
            echo "::warning::SARIF file '$SARIF_FILE' not found — skipping SARIF merge"
          fi
        fi
        set +e
        ods analyze --json "${SARIF_FLAGS[@]}" 2>/dev/null > "$ANALYZE_JSON" || \
          echo '{"issues":[],"total_lines":0,"summary":"No code analyzed"}' > "$ANALYZE_JSON"
        set -e
        echo "::endgroup::"

        echo "::group::③ Score — Technical Debt Impact"
        SCORE_JSON="$ODS_OUTPUT_DIR/score.json"
        set +e
        ods score --json "${SARIF_FLAGS[@]}" 2>/dev/null > "$SCORE_JSON" || \
          echo '{"technical_debt_delta":0,"verdict":"neutral"}' > "$SCORE_JSON"
        set -e
        echo "::endgroup::"

        echo "::group::④ Check — Policy Enforcement"
        CHECK_JSON="$ODS_OUTPUT_DIR/check.json"
        CHECK_EXIT=0
        set +e
        if [ -n "${ODS_POLICY:-}" ] && [ -f "$ODS_POLICY" ]; then
          ods check --json --policy "$ODS_POLICY" "${SARIF_FLAGS[@]}" > "$CHECK_JSON" 2>/dev/null || CHECK_EXIT=$?
        else
          ods check --json "${SARIF_FLAGS[@]}" > "$CHECK_JSON" 2>/dev/null || CHECK_EXIT=$?
        fi
        set -e
        echo "::endgroup::"

        # Generate report using external script
        echo "::group::Generate Report"
        REPORT_SCRIPT="${ACTION_DIR}/scripts/generate-report.py"
        # INPUT_SUMMARY env var tells the script whether to write to job summary
        python3 "$REPORT_SCRIPT" "$ODS_OUTPUT_DIR" "$GITHUB_OUTPUT"
        echo "::endgroup::"

        # Read result from the script output
        RESULT_VALUE=$(cat "$ODS_OUTPUT_DIR/.result" 2>/dev/null || echo "pass")

        # Fail if policy blocked
        if [ "$RESULT_VALUE" = "block" ]; then
          echo "::error::ODS policy blocked this change"
          exit 1
        fi

    - name: AI Attribution Report (optional)
      # always() so the digest still renders even when the pipeline blocked above.
      if: always() && inputs.report == 'true'
      shell: bash
      env:
        REPORT_SINCE: ${{ inputs.report-since }}
        OUT_DIR: ${{ inputs.output-dir }}
        INPUT_SUMMARY: ${{ inputs.summary }}
        ACTION_DIR: ${{ github.action_path }}
      run: |
        set -uo pipefail
        echo "::group::AI Attribution Report"
        mkdir -p "$OUT_DIR"
        if ! ods report --since "$REPORT_SINCE" --json > "$OUT_DIR/attribution.json" 2>"$OUT_DIR/attribution.stderr"; then
          echo "::warning::ods report failed — skipping attribution digest"
          [ -s "$OUT_DIR/attribution.stderr" ] && cat "$OUT_DIR/attribution.stderr"
          echo "::endgroup::"
          exit 0
        fi
        MD=$(python3 "$ACTION_DIR/scripts/render-attribution.py" "$OUT_DIR/attribution.json") || {
          echo "::warning::could not render attribution digest"; echo "::endgroup::"; exit 0; }
        printf '%s\n' "$MD" > "$OUT_DIR/ods-attribution.md"
        # Append to the shared summary so it also reaches the PR comment.
        if [ -f "$OUT_DIR/ods-summary.md" ]; then
          printf '\n%s\n' "$MD" >> "$OUT_DIR/ods-summary.md"
        fi
        # Append to the GitHub job summary.
        if [ "${INPUT_SUMMARY:-true}" = "true" ] && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
          printf '\n%s\n' "$MD" >> "$GITHUB_STEP_SUMMARY"
        fi
        echo "$MD"
        echo "::endgroup::"

    - name: Upload ODS Report
      if: inputs.artifact == 'true'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.output-dir }}/
        retention-days: ${{ inputs.artifact-retention-days }}

    - name: Comment on Pull Request
      if: inputs.comment == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        OUTPUT_DIR: ${{ inputs.output-dir }}
        GITHUB_EVENT_PATH: ${{ github.event_path }}
        GITHUB_SERVER_URL: ${{ github.server_url }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_RUN_ID: ${{ github.run_id }}
        GITHUB_API_URL: ${{ github.api_url }}
      run: |
        set -euo pipefail

        if [ -z "${GH_TOKEN:-}" ]; then
          echo "::warning::Skipping ODS PR comment because github-token is empty."
          exit 0
        fi

        if [ ! -f "$OUTPUT_DIR/ods-summary.md" ]; then
          echo "::warning::Skipping ODS PR comment because $OUTPUT_DIR/ods-summary.md was not found."
          exit 0
        fi

        # Extract PR number using jq
        PR_NUMBER=$(jq -r '.pull_request.number // .number // ""' "$GITHUB_EVENT_PATH" 2>/dev/null)

        if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
          echo "::warning::Skipping ODS PR comment — no PR number detected."
          exit 0
        fi

        RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

        # Build comment body
        {
          cat "$OUTPUT_DIR/ods-summary.md"
          echo
          echo "[View workflow run]($RUN_URL)"
        } > /tmp/ods-comment-body.md

        # Build comment JSON with jq
        jq -n --rawfile body /tmp/ods-comment-body.md '{body: $body}' > /tmp/ods-comment.json

        # Find existing ODS comment
        COMMENTS_URL="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments"
        curl -fsSL \
          -H "Authorization: Bearer ${GH_TOKEN}" \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          "${COMMENTS_URL}?per_page=100" \
          -o /tmp/ods-comments.json 2>/dev/null || true

        COMMENT_ID=$(jq -r '.[] | select(.body | contains("<!-- ods-compliance-report -->")) | .id // ""' /tmp/ods-comments.json 2>/dev/null || echo "")

        if [ -n "$COMMENT_ID" ] && [ "$COMMENT_ID" != "null" ]; then
          METHOD="PATCH"
          URL="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/issues/comments/${COMMENT_ID}"
        else
          METHOD="POST"
          URL="$COMMENTS_URL"
        fi

        curl -fsSL \
          -X "$METHOD" \
          -H "Authorization: Bearer ${GH_TOKEN}" \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          "$URL" \
          --data-binary "@/tmp/ods-comment.json" \
          >/dev/null 2>/dev/null || echo "::warning::Unable to create or update ODS PR comment."

    - name: Review routing
      # Runs only when the gate passed — deny wins, a blocked PR is never
      # routed. Routing is advisory: every failure here is a warning, never a
      # failed run.
      if: inputs.review-routing == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        TIER: ${{ steps.ods.outputs.review_tier }}
        PR_URL: ${{ github.event.pull_request.html_url }}
        ELEVATED_REVIEWERS: ${{ inputs.elevated-reviewers }}
      run: |
        set -euo pipefail

        if [ -z "${GH_TOKEN:-}" ]; then
          echo "::warning::Skipping review routing because github-token is empty."
          exit 0
        fi

        TIER="${TIER:-standard}"
        echo "Review tier: $TIER"

        declare -A COLORS=([auto]="2da44e" [standard]="0969da" [elevated]="d4a72c")

        # Ensure the tier labels exist, then converge the PR to exactly one.
        for t in auto standard elevated; do
          gh label create "ods:review/$t" \
            --color "${COLORS[$t]}" \
            --description "ODS review tier: $t" \
            --force >/dev/null 2>&1 || true
        done
        for t in auto standard elevated; do
          [ "$t" = "$TIER" ] && continue
          gh pr edit "$PR_URL" --remove-label "ods:review/$t" >/dev/null 2>&1 || true
        done
        gh pr edit "$PR_URL" --add-label "ods:review/$TIER" >/dev/null 2>&1 || \
          echo "::warning::Could not apply review-tier label (insufficient token permissions?)."

        # Elevated tier: request the configured reviewers.
        if [ "$TIER" = "elevated" ] && [ -n "${ELEVATED_REVIEWERS:-}" ]; then
          IFS=',' read -ra REVIEWERS <<< "$ELEVATED_REVIEWERS"
          for r in "${REVIEWERS[@]}"; do
            r="$(echo "$r" | tr -d '[:space:]')"
            [ -z "$r" ] && continue
            gh pr edit "$PR_URL" --add-reviewer "$r" >/dev/null 2>&1 || \
              echo "::warning::Could not request review from '$r' (not a collaborator, or the PR author)."
          done
        fi
