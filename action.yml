name: Open Delivery Spec
description: Validate delivery artifacts against Open Delivery Spec standards
author: Open Delivery Spec Contributors
branding:
  icon: check-circle
  color: green

inputs:
  check:
    description: 'Type of check to run'
    required: true
    default: 'all'
    # M1 production checks: branch-naming | commit-message | pr-description | all

  branch_name:
    description: 'Branch name to validate (for branch-naming check)'
    required: false

  commit_message:
    description: 'Commit message to validate (for commit-message check)'
    required: false

  pr_body:
    description: 'PR description body (for pr-description check)'
    required: false

  pr_number:
    description: 'Reserved for future AI review and approval checks'
    required: false

  review_record:
    description: 'Reserved for future AI review checks'
    required: false

  release_version:
    description: 'Reserved for future release readiness checks'
    required: false

  rollback_plan:
    description: 'Reserved for future rollback plan checks'
    required: false

  evidence_bundle:
    description: 'Reserved for future evidence bundle checks'
    required: false

  strict:
    description: 'Fail on warnings as well as errors'
    required: false
    default: 'false'

  spec_version:
    description: 'ODS spec version to validate against'
    required: false
    default: '1.0.0'

outputs:
  result:
    description: 'conformant | conformant-with-warnings | non-conformant'

runs:
  using: composite
  steps:
    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.22'

    - name: Install ODS CLI
      shell: bash
      run: go install github.com/open-delivery-spec/cli/cmd/ods@main

    - name: Run ODS Check
      id: ods
      shell: bash
      env:
        CHECK: ${{ inputs.check }}
        BRANCH_NAME: ${{ inputs.branch_name }}
        COMMIT_MESSAGE: ${{ inputs.commit_message }}
        PR_BODY: ${{ inputs.pr_body }}
        PR_NUMBER: ${{ inputs.pr_number }}
        RELEASE_VERSION: ${{ inputs.release_version }}
        ROLLBACK_PLAN: ${{ inputs.rollback_plan }}
        EVIDENCE_BUNDLE: ${{ inputs.evidence_bundle }}
        REVIEW_RECORD: ${{ inputs.review_record }}
        STRICT: ${{ inputs.strict }}
      run: |
        set -u

        STRICT_FLAG=""
        if [ "$STRICT" = "true" ]; then
          STRICT_FLAG="--strict"
        fi

        RESULT="conformant"
        RAN_CHECK=0

        set_result_from_output() {
          local output="$1"
          if echo "$output" | grep -q "non-conformant"; then
            RESULT="non-conformant"
          elif echo "$output" | grep -q "conformant with warnings" && [ "$RESULT" = "conformant" ]; then
            RESULT="conformant-with-warnings"
          fi
        }

        run_branch_check() {
          if [ -z "$BRANCH_NAME" ]; then
            echo "branch-naming requires branch_name"
            RESULT="non-conformant"
            return 2
          fi
          echo "Running ODS branch-naming check"
          OUT=$(ods validate branch "$BRANCH_NAME" $STRICT_FLAG 2>&1)
          STATUS=$?
          echo "$OUT"
          set_result_from_output "$OUT"
          return $STATUS
        }

        run_commit_check() {
          if [ -z "$COMMIT_MESSAGE" ]; then
            echo "commit-message requires commit_message"
            RESULT="non-conformant"
            return 2
          fi
          echo "Running ODS commit-message check"
          OUT=$(printf "%s" "$COMMIT_MESSAGE" | ods validate commit --stdin $STRICT_FLAG 2>&1)
          STATUS=$?
          echo "$OUT"
          set_result_from_output "$OUT"
          return $STATUS
        }

        run_pr_check() {
          if [ -z "$PR_BODY" ]; then
            echo "pr-description requires pr_body"
            RESULT="non-conformant"
            return 2
          fi
          echo "Running ODS pr-description check"
          OUT=$(printf "%s" "$PR_BODY" | ods validate pr --stdin $STRICT_FLAG 2>&1)
          STATUS=$?
          echo "$OUT"
          set_result_from_output "$OUT"
          return $STATUS
        }

        finish() {
          echo "result=$RESULT" >> "$GITHUB_OUTPUT"
        }

        case "$CHECK" in
          branch-naming)
            run_branch_check || { finish; exit 1; }
            ;;
          commit-message)
            run_commit_check || { finish; exit 1; }
            ;;
          pr-description)
            run_pr_check || { finish; exit 1; }
            ;;
          all)
            if [ -n "$BRANCH_NAME" ]; then
              RAN_CHECK=1
              run_branch_check || { finish; exit 1; }
            else
              echo "Skipping branch-naming: branch_name not provided"
            fi
            if [ -n "$COMMIT_MESSAGE" ]; then
              RAN_CHECK=1
              run_commit_check || { finish; exit 1; }
            else
              echo "Skipping commit-message: commit_message not provided"
            fi
            if [ -n "$PR_BODY" ]; then
              RAN_CHECK=1
              run_pr_check || { finish; exit 1; }
            else
              echo "Skipping pr-description: pr_body not provided"
            fi
            if [ "$RAN_CHECK" -eq 0 ]; then
              echo "No M1 inputs provided. Supply at least one of branch_name, commit_message, or pr_body."
              RESULT="non-conformant"
              finish
              exit 1
            fi
            ;;
          ai-review|ci-failure|release-readiness|approval-workflow|rollback-plan|prod-evidence)
            echo "Check '$CHECK' is experimental and is not enforced by validate-action yet."
            echo "Use the ODS CLI validate subcommands directly for draft module schema checks."
            RESULT="non-conformant"
            finish
            exit 1
            ;;
          *)
            echo "Unknown check: $CHECK"
            RESULT="non-conformant"
            finish
            exit 1
            ;;
        esac
        finish
