name: Open Delivery Spec
description: Validate delivery artifacts against Open Delivery Spec standards
author: Open Delivery Spec Contributors
branding:
  icon: check-circle
  color: green

inputs:
  check:
    description: 'Type of check to run'
    required: true
    default: 'all'
    # branch-naming | commit-message | pr-description | ai-review |
    # ci-failure | release-readiness | approval-workflow |
    # rollback-plan | prod-evidence | all

  branch_name:
    description: 'Branch name to validate (for branch-naming check)'
    required: false

  commit_message:
    description: 'Commit message to validate (for commit-message check)'
    required: false

  pr_body:
    description: 'PR description body (for pr-description check)'
    required: false

  pr_number:
    description: 'PR number for AI review checks'
    required: false

  release_version:
    description: 'Version for release readiness check'
    required: false

  rollback_plan:
    description: 'Path to rollback plan JSON file'
    required: false

  evidence_bundle:
    description: 'Path to evidence bundle JSON file (for prod-evidence check)'
    required: false

  strict:
    description: 'Fail on warnings as well as errors'
    required: false
    default: 'false'

  spec_version:
    description: 'ODS spec version to validate against'
    required: false
    default: '1.0.0'

outputs:
  result:
    description: 'conformant | conformant-with-warnings | non-conformant'

runs:
  using: composite
  steps:
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Install ODS CLI
      shell: bash
      run: go install github.com/open-delivery-spec/cli/cmd/ods@main

    - name: Run ODS Check
      id: ods
      shell: bash
      env:
        CHECK: ${{ inputs.check }}
        BRANCH_NAME: ${{ inputs.branch_name }}
        COMMIT_MESSAGE: ${{ inputs.commit_message }}
        PR_BODY: ${{ inputs.pr_body }}
        PR_NUMBER: ${{ inputs.pr_number }}
        RELEASE_VERSION: ${{ inputs.release_version }}
        ROLLBACK_PLAN: ${{ inputs.rollback_plan }}
        EVIDENCE_BUNDLE: ${{ inputs.evidence_bundle }}
        STRICT: ${{ inputs.strict }}
      run: |
        # Capture ODS output and write action outputs
        capture_result() {
          local output="$1"
          if echo "$output" | grep -q "conformant — all requirements"; then
            echo "result=conformant" >> "$GITHUB_OUTPUT"
          elif echo "$output" | grep -q "conformant with warnings"; then
            echo "result=conformant-with-warnings" >> "$GITHUB_OUTPUT"
          elif echo "$output" | grep -q "non-conformant"; then
            echo "result=non-conformant" >> "$GITHUB_OUTPUT"
          fi
          echo "$output"
        }

        case "$CHECK" in
          branch-naming)
            OUT=$(ods validate branch "$BRANCH_NAME" 2>&1) || { capture_result "$OUT"; exit 1; }
            capture_result "$OUT"
            ;;
          commit-message)
            OUT=$(echo "$COMMIT_MESSAGE" | ods validate commit --stdin 2>&1) || { capture_result "$OUT"; exit 1; }
            capture_result "$OUT"
            ;;
          pr-description)
            OUT=$(echo "$PR_BODY" | ods validate pr --stdin 2>&1) || { capture_result "$OUT"; exit 1; }
            capture_result "$OUT"
            ;;
          ai-review)
            OUT=$(ods review validate --pr "$PR_NUMBER" 2>&1) || { capture_result "$OUT"; exit 1; }
            capture_result "$OUT"
            ;;
          ci-failure)
            OUT=$(echo "" | ods ci parse 2>&1) || { capture_result "$OUT"; exit 1; }
            capture_result "$OUT"
            ;;
          release-readiness)
            OUT=$(ods release check --version "$RELEASE_VERSION" 2>&1) || { capture_result "$OUT"; exit 1; }
            capture_result "$OUT"
            ;;
          approval-workflow)
            OUT=$(ods approval check --pr "$PR_NUMBER" 2>&1) || { capture_result "$OUT"; exit 1; }
            capture_result "$OUT"
            ;;
          rollback-plan)
            OUT=$(ods validate rollback --file "$ROLLBACK_PLAN" 2>&1) || { capture_result "$OUT"; exit 1; }
            capture_result "$OUT"
            ;;
          prod-evidence)
            OUT=$(ods evidence verify "$EVIDENCE_BUNDLE" 2>&1) || { capture_result "$OUT"; exit 1; }
            capture_result "$OUT"
            ;;
          all)
            if [ -n "$BRANCH_NAME" ]; then
              OUT=$(ods validate branch "$BRANCH_NAME" 2>&1) || { capture_result "$OUT"; exit 1; }
              capture_result "$OUT"
            fi
            if [ -n "$COMMIT_MESSAGE" ]; then
              OUT=$(echo "$COMMIT_MESSAGE" | ods validate commit --stdin 2>&1) || { capture_result "$OUT"; exit 1; }
              capture_result "$OUT"
            fi
            if [ -n "$PR_BODY" ]; then
              OUT=$(echo "$PR_BODY" | ods validate pr --stdin 2>&1) || { capture_result "$OUT"; exit 1; }
              capture_result "$OUT"
            fi
            if [ -n "$ROLLBACK_PLAN" ]; then
              OUT=$(ods validate rollback --file "$ROLLBACK_PLAN" 2>&1) || { capture_result "$OUT"; exit 1; }
              capture_result "$OUT"
            fi
            if [ -n "$EVIDENCE_BUNDLE" ]; then
              OUT=$(ods evidence verify "$EVIDENCE_BUNDLE" 2>&1) || { capture_result "$OUT"; exit 1; }
              capture_result "$OUT"
            fi
            if [ -n "$RELEASE_VERSION" ]; then
              OUT=$(ods release check --version "$RELEASE_VERSION" 2>&1) || { capture_result "$OUT"; exit 1; }
              capture_result "$OUT"
            fi
            ;;
          *)
            echo "Unknown check: $CHECK"
            exit 1
            ;;
        esac
